# Memento-X Cloud — 生产环境 docker-compose
#
# 启动：
#   cp cloud/.env.production cloud/.env   # 首次部署
#   docker compose up -d
#
# 查看日志：
#   docker compose logs -f cloud
#
# 停止：
#   docker compose down
#
# 一键部署（首次）：
#   bash deploy.sh

version: "3.9"

services:
  # ── PostgreSQL 数据库 ──
  postgres:
    image: postgres:16-alpine
    container_name: memento-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: memento
      POSTGRES_PASSWORD: memento_dev
      POSTGRES_DB: memento
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memento"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Memento-X Cloud 中枢 ──
  cloud:
    build: .
    container_name: memento-cloud
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - cloud/.env
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  pgdata: